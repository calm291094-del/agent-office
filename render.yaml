# render.yaml - Configuración para AgentOffice en Render
# Ubicación: Raíz del repositorio (/opt/render/project/src/render.yaml)

services:
  # ============================================================
  # SERVICIO 1: BACKEND (API + Agentes)
  # ============================================================
  - type: web
    name: agent-office
    runtime: node
    plan: free
    buildCommand: |
      echo "📦 Instalando dependencias del backend..."
      npm install
      echo "✅ Build completado"
    startCommand: |
      echo "🚀 Iniciando servidor backend..."
      node packages/server/index.js
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://agent-office-ui.onrender.com
    healthCheckPath: /health

  # ============================================================
  # SERVICIO 2: FRONTEND (UI + API Local)
  # ============================================================
  - type: web
    name: agent-office-ui
    runtime: node
    plan: free
    buildCommand: |
      echo "📦 Instalando dependencias del frontend..."
      npm install
      echo "✅ Build completado"
    startCommand: |
      echo "🚀 Iniciando servidor UI..."
      node packages/ui/server.js
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_URL
        value: https://agent-office.onrender.com
    healthCheckPath: /

  # ============================================================
  # OPCIONAL: REDIS (para caché y estado compartido)
