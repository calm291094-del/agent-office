services:
  # Servidor backend
  - type: web
    name: agent-office
    env: node
    buildCommand: npm install
    startCommand: node packages/server/index.js
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

  # UI Frontend
  - type: web
    name: agent-office-ui
    env: node
    buildCommand: npm install
    startCommand: node packages/ui/server.js
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
