services:
  # ============================================================
  # SERVICIO 1: BACKEND (agent-office)
  # ============================================================
  - type: web
    name: agent-office
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node packages/server/index.js
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  # ============================================================
  # SERVICIO 2: UI (agent-office-ui)
  # ============================================================
  - type: web
    name: agent-office-ui
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node packages/ui/server.js
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_URL
        value: https://agent-office.onrender.com

  # ============================================================
  # SERVICIO 3: PIXEL AGENTS (NUEVO)
  # ============================================================
  - type: web
    name: pixel-agents-web
    runtime: node
    plan: free
    buildCommand: |
      cd pixel-agents-repo
      npm install
      npm run build
    startCommand: |
      cd pixel-agents-repo
      npm start
    envVars:
      - key: NODE_VERSION
        value: 22.23.1
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
    disk:
      name: pixel-agents-data
      mountPath: /app/pixel-agents-repo/data
      sizeGB: 1
